name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-docker:
    runs-on: [self-hosted, Linux, X64, track1-builder-final]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run offline release check
        run: scripts/offline_release_check.sh

      - name: Build Docker image
        if: matrix.python-version == '3.12'
        run: docker build -t track1-token-router .

      - name: Docker help smoke test
        if: matrix.python-version == '3.12'
        run: docker run --rm track1-token-router --help

      - name: Docker ask smoke test
        if: matrix.python-version == '3.12'
        run: docker run --rm -e ROUTER_MODE=mock track1-token-router ask "What is 2+2?"

      - name: Docker JSONL run smoke test
        if: matrix.python-version == '3.12'
        run: docker run --rm -e ROUTER_MODE=mock track1-token-router run --jsonl evals/golden/tasks.jsonl --out /tmp/router-output.jsonl

      - name: Docker official Track 1 smoke test
        if: matrix.python-version == '3.12'
        run: |
          mkdir -p /tmp/track1-input /tmp/track1-output
          cp fixtures/official/lablab_track1_tasks.json /tmp/track1-input/tasks.json
          docker run --rm \
            -e ROUTER_MODE=mock \
            -v /tmp/track1-input:/input:ro \
            -v /tmp/track1-output:/output \
            track1-token-router
          python -m json.tool /tmp/track1-output/results.json >/dev/null
