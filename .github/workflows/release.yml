name: Release

on:
  push:
    tags:
      - "v*"
      - "offline-*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  ghcr-image:
    runs-on: [self-hosted, Linux, X64, track1-builder-stable]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Run offline release check
        run: scripts/offline_release_check.sh

      - name: Build release candidate for resource gate
        run: |
          dockerfile=Dockerfile
          if [[ "${GITHUB_REF_NAME}" == v3.* ]]; then dockerfile=Dockerfile.championship; fi
          docker build -f "$dockerfile" -t track1-token-router:release-gate .

      - name: Docker 4GB 2vCPU linux-amd64 gate
        run: bash scripts/docker_resource_gate.sh track1-token-router:release-gate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ startsWith(github.ref_name, 'v3.') && 'Dockerfile.championship' || 'Dockerfile' }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.description=AMD Developer Hackathon ACT II Track 1 token-efficient router

      - name: Pull the published image without local build state
        run: |
          docker image rm "${IMAGE_NAME}:${GITHUB_REF_NAME}" 2>/dev/null || true
          for attempt in 1 2 3 4 5; do
            if docker pull --platform linux/amd64 "${IMAGE_NAME}:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              printf 'public image pull failed after %s attempts\n' "$attempt" >&2
              exit 1
            fi
            sleep "$((attempt * 5))"
          done

      - name: Gate the exact published image under evaluator limits
        run: bash scripts/docker_resource_gate.sh "${IMAGE_NAME}:${GITHUB_REF_NAME}"

      - name: Audit public manifest and immutable labels
        run: |
          python scripts/competition_submission_audit.py \
            --image "${IMAGE_NAME}:${GITHUB_REF_NAME}" \
            --expected-revision "${GITHUB_SHA}" \
            --expected-version "${GITHUB_REF_NAME}" \
            --json
